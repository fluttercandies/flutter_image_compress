name: Runnable (stable)

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"

jobs:
  analyze:
    name: Analyze on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true
      - name: Log Dart/Flutter versions
        run: |
          dart --version
          flutter --version
      - name: Cache pub git deps
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache/git
          key: ${{ runner.os }}-pub-git-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-git-
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Install melos
        run: dart pub global activate melos
      - name: Melos bootstrap
        run: melos bootstrap
      - name: Check Dart code formatting
        run: melos exec -- "dart format . -o none --set-exit-if-changed"
      - name: Analyze
        run: melos run analyze
  test_iOS:
    needs: analyze
    name: Test iOS on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
        build_cmd:
          - melos run try_build_ios
          - melos run try_build_ios_swift_package_manager
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          architecture: x64
          channel: "stable"
          cache: true
      - run: dart --version
      - run: flutter --version
      - name: Cache pub git deps
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache/git
          key: ${{ runner.os }}-pub-git-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-git-
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
            packages/flutter_image_compress/example/ios/Pods
            packages/flutter_image_compress/example/macos/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock', '**/Podfile') }}
          restore-keys: |
            ${{ runner.os }}-pods-
      - name: Install melos
        run: dart pub global activate melos
      - name: Melos bootstrap
        run: melos bootstrap
      - name: Build iOS debug with melos
        run: ${{ matrix.build_cmd }}

  integration_test_iOS:
    needs: analyze
    name: Integration test iOS (${{ matrix.spm }}) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
        spm: [cocoapods, swift-package-manager]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true
      - run: flutter --version
      - name: Cache pub git deps
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache/git
          key: ${{ runner.os }}-pub-git-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-git-
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
            packages/flutter_image_compress/example/ios/Pods
            packages/flutter_image_compress/example/macos/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock', '**/Podfile') }}
          restore-keys: |
            ${{ runner.os }}-pods-
      - name: Install melos
        run: dart pub global activate melos
      - name: Melos bootstrap
        run: melos bootstrap
      - name: Configure Swift Package Manager
        run: |
          if [ "${{ matrix.spm }}" = "swift-package-manager" ]; then
            flutter config --enable-swift-package-manager
          else
            flutter config --no-enable-swift-package-manager
          fi
      - name: Boot iOS simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep -E "iPhone [0-9]+ \(" | head -n 1 | grep -oE "[0-9A-F-]{36}")
          echo "Booting $UDID"
          xcrun simctl boot "$UDID"
          # Wait until the simulator is fully booted (past the "Booted"
          # state simctl returns immediately) before handing it to
          # `flutter test`. Under SPM we have seen the test host launch
          # against a not-yet-ready simulator and never emit any output,
          # causing the job to sit at 'Xcode build done.' for the entire
          # 60-minute default timeout.
          xcrun simctl bootstatus "$UDID" -b
          echo "DEVICE_ID=$UDID" >> $GITHUB_ENV
      # `flutter test` on the iOS simulator intermittently hands the test
      # host to a simulator that never becomes runnable and hangs without
      # emitting any output (flutter/flutter#153433 / #115985 —
      # partial fix in #154970 still leaks some failure paths). Retry
      # once per attempt so a single flake doesn't fail the job; the
      # 15-min per-attempt timeout keeps a real hang from eating a
      # runner slot.
      - name: Run integration tests
        uses: nick-fields/retry@v3
        env:
          DEVICE_ID: ${{ env.DEVICE_ID }}
        with:
          timeout_minutes: 15
          max_attempts: 2
          command: cd packages/flutter_image_compress/example && flutter test integration_test/compress_test.dart -d "$DEVICE_ID"

  integration_test_macOS:
    needs: analyze
    name: Integration test macOS (${{ matrix.spm }}) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
        spm: [cocoapods, swift-package-manager]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true
      - run: flutter --version
      - name: Cache pub git deps
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache/git
          key: ${{ runner.os }}-pub-git-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-git-
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
            packages/flutter_image_compress/example/ios/Pods
            packages/flutter_image_compress/example/macos/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock', '**/Podfile') }}
          restore-keys: |
            ${{ runner.os }}-pods-
      - name: Install melos
        run: dart pub global activate melos
      - name: Melos bootstrap
        run: melos bootstrap
      - name: Configure Swift Package Manager
        run: |
          if [ "${{ matrix.spm }}" = "swift-package-manager" ]; then
            flutter config --enable-swift-package-manager
          else
            flutter config --no-enable-swift-package-manager
          fi
      - name: Run integration tests
        working-directory: packages/flutter_image_compress/example
        run: flutter test integration_test/compress_test.dart -d macos

  test_android:
    needs: analyze
    name: Test Android on ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.1"
          cache-disabled: true
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true
      - run: dart --version
      - run: flutter --version
      - name: Cache pub git deps
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache/git
          key: ${{ runner.os }}-pub-git-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-git-
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - run: flutter pub get
      - name: Install melos
        run: dart pub global activate melos
      - name: Melos bootstrap
        run: melos bootstrap
      - name: Build legacy Kotlin APK
        run: melos run try_build_apk
      - name: Verify legacy Kotlin project
        run: |
          gradle -p .github/fixtures/kotlin_mode/legacy help \
            -DflutterImageCompress.expectedBuiltInKotlin=false \
            -I ../../../scripts/verify_flutter_image_compress_kotlin_mode.init.gradle
      - name: Verify explicit built-in Kotlin project
        run: |
          gradle -p .github/fixtures/kotlin_mode/built_in_explicit help \
            -DflutterImageCompress.expectedBuiltInKotlin=true \
            -I ../../../scripts/verify_flutter_image_compress_kotlin_mode.init.gradle
      - name: Verify AGP-default built-in Kotlin project
        run: |
          gradle -p .github/fixtures/kotlin_mode/built_in_default help \
            -DflutterImageCompress.expectedBuiltInKotlin=true \
            -I ../../../scripts/verify_flutter_image_compress_kotlin_mode.init.gradle

  test_web:
    needs: analyze
    name: Test build web on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true
      - run: dart --version
      - run: flutter --version
      - name: Cache pub git deps
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache/git
          key: ${{ runner.os }}-pub-git-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-git-
      - name: Install melos
        run: dart pub global activate melos
      - name: Melos bootstrap
        run: melos bootstrap
      - run: melos run try_build_web

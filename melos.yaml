name: flutter_image_compress
repository: https://github.com/fluttercandies/flutter_image_compress

packages:
  - packages/**

scripts:
  analyze:
    exec: dart analyze .
  get:
    exec: flutter pub get
  test:
    exec: flutter test
  format:
    exec: dart format --set-exit-if-changed .
  try_build_apk:
    exec: |
      set -e
      flutter pub get
      flutter build apk --debug
    packageFilters:
      fileExists: lib/main.dart
  try_build_ios:
    exec: |
      set -e
      flutter config --no-enable-swift-package-manager
      flutter pub get
      flutter build ios --debug --no-codesign
    packageFilters:
      fileExists: lib/main.dart
  try_build_ios_swift_package_manager:
    exec: |
      set -e
      flutter config --enable-swift-package-manager
      flutter pub get
      flutter build ios --debug --no-codesign
    packageFilters:
      fileExists: lib/main.dart
  try_build_web:
    exec: |
      set -e
      flutter pub get
      flutter build web
    packageFilters:
      fileExists: lib/main.dart
  try_build_macos:
    exec: |
      set -e
      flutter pub get
      flutter build macos
    packageFilters:
      fileExists: lib/main.dart
  verify_ios_behavior:
    description: |
      Run the integration_test behavior baseline on an iOS device/simulator.
      Requires a booted iOS simulator or connected device. Pass DEVICE_ID via
      env to target a specific one; otherwise Flutter picks the first iOS
      device.
    exec: |
      set -e
      flutter pub get
      if [ -n "$DEVICE_ID" ]; then
        flutter test integration_test/compress_test.dart -d "$DEVICE_ID"
      else
        flutter test integration_test/compress_test.dart
      fi
    packageFilters:
      fileExists: integration_test/compress_test.dart
  verify_macos_behavior:
    description: |
      Run the integration_test behavior baseline on macOS desktop.
    exec: |
      set -e
      flutter pub get
      flutter test integration_test/compress_test.dart -d macos
    packageFilters:
      fileExists: integration_test/compress_test.dart
  cp_files:
    exec: |
      set -e
      if [ -f "../../LICENSE" ]; then
        cp ../../LICENSE LICENSE
      fi
      if [ -f "../../README.md" ]; then
        cp ../../README.md README.md
      fi
sdkPath: auto

command:
  version:
    releaseUrl: true

group 'com.fluttercandies.flutter_image_compress'
version '1.0-SNAPSHOT'

def builtInKotlinFlag = (project.findProperty("android.builtInKotlin") ?: "false").toString().toBoolean()
def hasKotlinExtension = project.extensions.findByName("kotlin") != null
def useBuiltInKotlin = builtInKotlinFlag && hasKotlinExtension

if (!useBuiltInKotlin) {
    buildscript {
        ext.kotlin_version = '1.8.20'
        repositories {
            google()
            mavenCentral()
        }

        dependencies {
            classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        }
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'

if (!useBuiltInKotlin) {
    apply plugin: 'kotlin-android'
}

android {
    if (project.android.hasProperty("namespace")) {
        namespace 'com.fluttercandies.flutter_image_compress'
    }

    compileSdkVersion 34

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        minSdkVersion 21
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    if (!useBuiltInKotlin) {
        kotlinOptions {
            jvmTarget = '17'
        }
    }
}

dependencies {
    implementation 'androidx.exifinterface:exifinterface:1.3.3'
    implementation 'androidx.heifwriter:heifwriter:1.0.0'
    implementation 'commons-io:commons-io:2.16.1'
}

if (useBuiltInKotlin) {
    kotlin {
        compilerOptions {
            jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
        }
    }
}

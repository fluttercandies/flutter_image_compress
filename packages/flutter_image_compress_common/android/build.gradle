group 'com.fluttercandies.flutter_image_compress'
version '1.0-SNAPSHOT'

def builtInKotlinFlag = (project.findProperty("android.builtInKotlin") ?: "false").toString().toBoolean()
def hasKotlinExtension = project.extensions.findByName("kotlin") != null
def useBuiltInKotlin = builtInKotlinFlag && hasKotlinExtension

if (!useBuiltInKotlin) {
    buildscript {
        ext.kotlin_version = '1.8.20'
        repositories {
            google()
            mavenCentral()
        }

        dependencies {
            classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        }
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'

if (!useBuiltInKotlin) {
    apply plugin: 'kotlin-android'
}

android {
    if (project.android.hasProperty("namespace")) {
        namespace 'com.fluttercandies.flutter_image_compress'
    }

    compileSdkVersion 34

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        minSdkVersion 21
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    if (!useBuiltInKotlin) {
        kotlinOptions {
            jvmTarget = '17'
        }
    }
}

dependencies {
    // 1.3.7+ fixes several WebP writer bugs relevant to keepExif=true on
    // WebP output: VP8-only / VP8L-only streams (which Bitmap.compress emits
    // for lossy/lossless WebP without a VP8X header), corrupted output for
    // WebP > 8191px, "invalid APP1 marker" writes, and the VP8X E flag not
    // getting set on the RIFF header so viewers didn't look at the EXIF
    // chunk. 1.3.3 pre-dates all of these. If bumped, also bump the
    // KEEP-IN-SYNC copy in the example app: packages/flutter_image_compress/
    // example/android/app/build.gradle.kts.
    implementation 'androidx.exifinterface:exifinterface:1.4.2'
    implementation 'androidx.heifwriter:heifwriter:1.0.0'
    implementation 'commons-io:commons-io:2.16.1'
}

if (useBuiltInKotlin) {
    kotlin {
        compilerOptions {
            jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
        }
    }
}
